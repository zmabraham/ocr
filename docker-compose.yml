version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ocr-postgres
    environment:
      POSTGRES_USER: ocr_user
      POSTGRES_PASSWORD: ocr_password
      POSTGRES_DB: ocr_workflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocr_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-backend
    environment:
      - DATABASE_URL=postgresql://ocr_user:ocr_password@postgres:5432/ocr_workflow
      - REDIS_URL=redis://redis:6379/0
      - TESSERACT_CMD=/usr/bin/tesseract
    volumes:
      - ./uploads:/workspace/ocr-workflow/uploads
      - ./models:/workspace/ocr-workflow/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # OCR Worker
  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-worker
    environment:
      - DATABASE_URL=postgresql://ocr_user:ocr_password@postgres:5432/ocr_workflow
      - REDIS_URL=redis://redis:6379/0
      - TESSERACT_CMD=/usr/bin/tesseract
    volumes:
      - ./uploads:/workspace/ocr-workflow/uploads
      - ./models:/workspace/ocr-workflow/models
    depends_on:
      - postgres
      - redis
    command: python -m workflow.workers

volumes:
  postgres_data:
